<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MindTrack Media | Analise comportamental de consumo{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Sistema inteligente que analisa como filmes, series e conteudos impactam seu humor, comportamento e tempo.{% endblock %}">
    <meta name="keywords" content="analise comportamental, filmes, series, produtividade, humor, dashboard, flask app, media intelligence">
    <meta name="author" content="Guilherme Michael">
    <meta property="og:title" content="{% block og_title %}MindTrack Media{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Entenda como o conteudo que você consome impacta sua mente.{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="MindTrack Media">
    <meta name="theme-color" content="#020617">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.88);
            --surface-strong: rgba(15, 23, 42, 0.98);
            --surface-soft: rgba(30, 41, 59, 0.72);
            --border: rgba(148, 163, 184, 0.18);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --primary: #38bdf8;
            --secondary: #14b8a6;
            --accent: #f59e0b;
            --danger: #f87171;
            --success: #34d399;
            --shadow: 0 24px 60px rgba(2, 6, 23, 0.55);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "IBM Plex Sans", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(20, 184, 166, 0.16), transparent 30%),
                radial-gradient(circle at bottom center, rgba(245, 158, 11, 0.12), transparent 26%),
                linear-gradient(180deg, #020617 0%, #06101f 48%, #020617 100%);
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: auto;
            width: 380px;
            height: 380px;
            border-radius: 999px;
            filter: blur(70px);
            z-index: -1;
            pointer-events: none;
            opacity: 0.5;
        }

        body::before {
            top: -120px;
            left: -120px;
            background: rgba(56, 189, 248, 0.12);
        }

        body::after {
            right: -100px;
            bottom: -120px;
            background: rgba(20, 184, 166, 0.14);
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        img {
            max-width: 100%;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        .page-shell {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 48px;
        }

        .glass {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(56, 189, 248, 0.24);
            background: rgba(56, 189, 248, 0.08);
            color: #c4f1ff;
            font-size: 0.88rem;
            letter-spacing: 0.02em;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #f8fafc;
        }

        .brand-mark::before {
            content: "";
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 0 18px rgba(56, 189, 248, 0.75);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 48px;
            padding: 0 18px;
            border: 0;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
            background: linear-gradient(120deg, #0ea5e9, #14b8a6);
            box-shadow: 0 16px 32px rgba(14, 165, 233, 0.24);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 36px rgba(14, 165, 233, 0.3);
        }

        .btn:disabled {
            cursor: wait;
            opacity: 0.7;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: none;
            color: var(--text);
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field label {
            font-size: 0.92rem;
            color: #cbd5e1;
        }

        .input,
        .select {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.72);
            color: var(--text);
            padding: 14px 16px;
            outline: none;
            transition: border-color 180ms ease, box-shadow 180ms ease;
        }

        .input:focus,
        .select:focus {
            border-color: rgba(56, 189, 248, 0.65);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
        }

        .helper,
        .muted {
            color: var(--muted);
        }

        .toast-stack {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 30;
            display: grid;
            gap: 10px;
        }

        .toast {
            min-width: 260px;
            max-width: 360px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(15, 23, 42, 0.94);
            box-shadow: var(--shadow);
            animation: slideIn 220ms ease;
        }

        .toast.success {
            border-color: rgba(52, 211, 153, 0.32);
        }

        .toast.error {
            border-color: rgba(248, 113, 113, 0.32);
        }

        .page-loader {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            background: rgba(2, 6, 23, 0.55);
            backdrop-filter: blur(10px);
            z-index: 25;
        }

        .page-loader.active {
            display: grid;
        }

        .page-loader .spinner {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 4px solid rgba(148, 163, 184, 0.2);
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
        }

        [data-reveal] {
            opacity: 0;
            transform: translateY(18px);
            animation: reveal 500ms ease forwards;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-6px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            .page-shell {
                width: min(100% - 20px, 1180px);
                padding-top: 18px;
                padding-bottom: 32px;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="page-loader" id="pageLoader" aria-hidden="true">
        <div class="spinner"></div>
    </div>
    <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
    {% block body %}{% endblock %}
    <script>
        function setLoading(isLoading) {
            const loader = document.getElementById("pageLoader");
            if (!loader) return;
            loader.classList.toggle("active", Boolean(isLoading));
            document.body.style.opacity = isLoading ? "0.96" : "1";
        }

        function toast(message, type = "success") {
            const stack = document.getElementById("toastStack");
            if (!stack) return;

            const item = document.createElement("div");
            item.className = `toast ${type}`;
            item.textContent = message;
            stack.appendChild(item);

            window.setTimeout(() => {
                item.remove();
            }, 3200);
        }

        async function api(url, options = {}) {
            const requestOptions = {
                credentials: "include",
                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                },
                ...options
            };

            const shouldManageLoader = options.manageLoader !== false;
            if (shouldManageLoader) setLoading(true);

            try {
                const response = await fetch(url, requestOptions);
                const isJson = response.headers.get("content-type")?.includes("application/json");
                const payload = isJson ? await response.json() : null;

                if (!response.ok) {
                    const message = payload?.error || "Algo deu errado";
                    throw new Error(message);
                }

                return payload;
            } finally {
                if (shouldManageLoader) setLoading(false);
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
